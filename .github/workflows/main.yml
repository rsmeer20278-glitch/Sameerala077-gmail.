name: RDP

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 3600
    steps:
      - name: 🚀 Free Space & Optimize
        run: |
          # تنظيف المساحة (يكسب 20-30GB)
          Remove-Item -Path C:\Windows\Temp\* -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "C:\Program Files\Microsoft Visual Studio" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "C:\msys64" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "C:\android" -Recurse -Force -ErrorAction SilentlyContinue
          Dism.exe /online /Cleanup-Image /StartComponentCleanup /ResetBase
          
          # تعطيل الصوت والخدمات الثقيلة
          Stop-Service -Name AudioSrv -Force -ErrorAction SilentlyContinue
          Stop-Service -Name SysMain -Force -ErrorAction SilentlyContinue
          Set-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Audio" -Name "DisableAudio" -Value 1 -Force
          
          # إعدادات RDP للسرعة
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "fDisableAudioCapture" -Value 1 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "fEnableAudioRedirection" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force

      - name: 👤 Create User
        run: |
          $password = "P@ssw0rd123"
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          if (Get-LocalUser -Name "RDP" -ErrorAction SilentlyContinue) { Remove-LocalUser -Name "RDP" -Force }
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires -PasswordNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"

      - name: 📦 Install Tailscale
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"
          
          Write-Host "📥 Downloading Tailscale..."
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath -UseBasicParsing
          
          Write-Host "📦 Installing Tailscale..."
          $process = Start-Process msiexec.exe -ArgumentList "/i `"$installerPath`" /quiet /norestart" -Wait -PassThru
          
          if ($process.ExitCode -ne 0) {
              Write-Error "❌ Installation failed with code: $($process.ExitCode)"
              exit 1
          }
          
          Remove-Item $installerPath -Force
          
          # التحقق من التثبيت
          Start-Sleep -Seconds 5
          if (Test-Path "C:\Program Files\Tailscale\tailscale.exe") {
              Write-Host "✅ Tailscale installed successfully!"
          } else {
              Write-Host "⚠️ Tailscale not found at default path. Searching..."
              Get-ChildItem -Path "C:\" -Recurse -Filter "tailscale.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          }

      - name: 🔗 Connect
        run: |
          # تحديد مسار Tailscale
          $tsPath = "C:\Program Files\Tailscale\tailscale.exe"
          
          # إذا لم يوجد في المسار الافتراضي، ابحث عنه
          if (-not (Test-Path $tsPath)) {
              Write-Host "Searching for Tailscale..."
              $found = Get-ChildItem -Path "C:\" -Recurse -Filter "tailscale.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($found) {
                  $tsPath = $found.FullName
                  Write-Host "✅ Found Tailscale at: $tsPath"
              } else {
                  Write-Error "❌ Tailscale not found!"
                  exit 1
              }
          }
          
          Write-Host "🔗 Connecting to Tailscale..."
          & $tsPath up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=rdp-$env:GITHUB_RUN_ID --accept-routes
          
          if ($LASTEXITCODE -ne 0) {
              Write-Error "❌ Tailscale connection failed!"
              exit 1
          }
          
          # انتظار الحصول على IP
          Write-Host "⏳ Waiting for IP address..."
          $ip = $null
          $retries = 0
          while (-not $ip -and $retries -lt 15) {
              Start-Sleep -Seconds 5
              $ip = & $tsPath ip -4
              $retries++
              Write-Host "Attempt $retries/15..."
          }
          
          if (-not $ip) {
              Write-Error "❌ Failed to get IP after 15 attempts"
              exit 1
          }
          
          echo "IP=$ip" >> $env:GITHUB_ENV
          $free = [math]::Round((Get-PSDrive C).Free / 1GB, 2)
          echo "SPACE=$free" >> $env:GITHUB_ENV
          Write-Host "✅ Connected! IP: $ip"

      - name: 🔑 RDP INFO
        run: |
          Write-Host "╔═══════════════════════════════════════╗"
          Write-Host "║     🚀 RDP READY                     ║"
          Write-Host "╠═══════════════════════════════════════╣"
          Write-Host "║  📍 IP    : $env:IP                  ║"
          Write-Host "║  👤 User  : RDP                      ║"
          Write-Host "║  🔑 Pass  : P@ssw0rd123             ║"
          Write-Host "║  🔇 Sound : OFF                     ║"
          Write-Host "║  💾 Space : $env:SPACE GB FREE      ║"
          Write-Host "╚═══════════════════════════════════════╝"

      - name: ⏳ Keep Alive
        run: |
          Write-Host "🔄 RDP Active - Click 'Cancel workflow' to stop"
          while ($true) { 
              Write-Host "[$(Get-Date -Format 'HH:mm:ss')] ✅ Active"
              Start-Sleep -Seconds 300 
          }
