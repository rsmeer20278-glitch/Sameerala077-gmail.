name: RDP

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 3600
    steps:
      - name: 🚀 Free Space & Optimize
        run: |
          # تنظيف المساحة (يكسب 20-30GB)
          Remove-Item -Path C:\Windows\Temp\* -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "C:\Program Files\Microsoft Visual Studio" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "C:\msys64" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "C:\android" -Recurse -Force -ErrorAction SilentlyContinue
          Dism.exe /online /Cleanup-Image /StartComponentCleanup /ResetBase
          
          # تعطيل الصوت والخدمات الثقيلة
          Stop-Service -Name AudioSrv -Force -ErrorAction SilentlyContinue
          Stop-Service -Name SysMain -Force -ErrorAction SilentlyContinue
          Set-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Audio" -Name "DisableAudio" -Value 1 -Force
          
          # إعدادات RDP للسرعة
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "fDisableAudioCapture" -Value 1 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "fEnableAudioRedirection" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force

      - name: 👤 Create User
        run: |
          $password = "P@ssw0rd123"
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          if (Get-LocalUser -Name "RDP" -ErrorAction SilentlyContinue) { Remove-LocalUser -Name "RDP" -Force }
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires -PasswordNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"

      - name: 📦 Install Tailscale
        run: |
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi" -OutFile "$env:TEMP\tailscale.msi"
          Start-Process msiexec.exe -ArgumentList "/i", "`"$env:TEMP\tailscale.msi`"", "/quiet", "/norestart" -Wait

      - name: 🔗 Connect
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=rdp-$env:GITHUB_RUN_ID
          Start-Sleep -Seconds 10
          $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          echo "IP=$ip" >> $env:GITHUB_ENV
          $free = [math]::Round((Get-PSDrive C).Free / 1GB, 2)
          echo "SPACE=$free" >> $env:GITHUB_ENV

      - name: 🔑 RDP INFO
        run: |
          Write-Host "========================================="
          Write-Host "🚀 RDP READY - FAST & LARGE STORAGE"
          Write-Host "========================================="
          Write-Host "IP    : $env:IP"
          Write-Host "User  : RDP"
          Write-Host "Pass  : P@ssw0rd123"
          Write-Host "Sound : 🔇 OFF"
          Write-Host "Space : $env:SPACE GB FREE"
          Write-Host "========================================="

      - name: ⏳ Keep Alive
        run: while ($true) { Start-Sleep -Seconds 300 }
