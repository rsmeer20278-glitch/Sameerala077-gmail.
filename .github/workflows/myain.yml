name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Configure Core RDP Settings
        run: |
          # Enable Remote Desktop and disable Network Level Authentication (if needed)
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
                             -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "SecurityLayer" -Value 0 -Force

          # Remove any existing rule with the same name to avoid duplication
          netsh advfirewall firewall delete rule name="RDP-Tailscale"
          
          # For testing, allow any incoming connection on port 3389
          netsh advfirewall firewall add rule name="RDP-Tailscale" `
            dir=in action=allow protocol=TCP localport=3389

          # (Optional) Restart the Remote Desktop service to ensure changes take effect
          Restart-Service -Name TermService -Force

      - name: Create RDP User with Fixed Password
        run: |
          # استخدام الباسورد الثابت
          $password = "P@ssw0rd123"
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          
          # حذف المستخدم إذا كان موجوداً مسبقاً
          if (Get-LocalUser -Name "RDP" -ErrorAction SilentlyContinue) {
              Remove-LocalUser -Name "RDP" -Force
          }
          
          # إنشاء المستخدم
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
          
          echo "RDP_CREDS=User: RDP | Password: $password" >> $env:GITHUB_ENV
          
          if (-not (Get-LocalUser -Name "RDP")) {
              Write-Error "User creation failed"
              exit 1
          }

      - name: Install Tailscale
        run: |
          # مسار التثبيت المباشر
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"
          
          Write-Host "📥 Downloading Tailscale..."
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath -UseBasicParsing
          
          Write-Host "📦 Installing Tailscale..."
          Start-Process msiexec.exe -ArgumentList "/i `"$installerPath`" /quiet /norestart" -Wait
          
          # تنظيف
          Remove-Item $installerPath -Force
          
          # التحقق من التثبيت
          Start-Sleep -Seconds 5
          if (Test-Path "C:\Program Files\Tailscale\tailscale.exe") {
              Write-Host "✅ Tailscale installed successfully!"
          } else {
              Write-Host "⚠️ Tailscale installation might have failed. Trying alternative path..."
          }

      - name: Establish Tailscale Connection
        run: |
          # تحديد المسار الصحيح لـ Tailscale
          $tsPath = "C:\Program Files\Tailscale\tailscale.exe"
          
          # التحقق من وجود الملف
          if (-not (Test-Path $tsPath)) {
              Write-Host "❌ Tailscale not found at: $tsPath"
              Write-Host "Searching for tailscale.exe..."
              Get-ChildItem -Path "C:\" -Recurse -Filter "tailscale.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
              exit 1
          }
          
          Write-Host "🔗 Connecting to Tailscale..."
          & $tsPath up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-$env:GITHUB_RUN_ID --accept-routes
          
          if ($LASTEXITCODE -ne 0) {
              Write-Error "❌ Tailscale connection failed!"
              exit 1
          }
          
          # انتظار الحصول على IP
          Write-Host "⏳ Waiting for IP address..."
          $tsIP = $null
          $retries = 0
          while (-not $tsIP -and $retries -lt 15) {
              Start-Sleep -Seconds 5
              $tsIP = & $tsPath ip -4
              $retries++
              Write-Host "Attempt $retries/15..."
          }
          
          if (-not $tsIP) {
              Write-Error "❌ Tailscale IP not assigned after 15 attempts"
              exit 1
          }
          
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV
          Write-Host "✅ Tailscale IP: $tsIP"

      - name: Verify RDP Accessibility
        run: |
          Write-Host "Tailscale IP: $env:TAILSCALE_IP"
          
          # Test connectivity using Test-NetConnection against the Tailscale IP on port 3389
          $testResult = Test-NetConnection -ComputerName $env:TAILSCALE_IP -Port 3389
          if (-not $testResult.TcpTestSucceeded) {
              Write-Warning "⚠️ TCP connection to RDP port 3389 failed, but RDP might still work"
          } else {
              Write-Host "✅ TCP connectivity successful!"
          }

      - name: Display RDP Credentials
        run: |
          Write-Host "╔═══════════════════════════════════════╗"
          Write-Host "║     🚀 RDP ACCESS INFORMATION        ║"
          Write-Host "╠═══════════════════════════════════════╣"
          Write-Host "║  📍 IP Address: $env:TAILSCALE_IP    ║"
          Write-Host "║  👤 Username : RDP                   ║"
          Write-Host "║  🔑 Password : P@ssw0rd123          ║"
          Write-Host "╠═══════════════════════════════════════╣"
          Write-Host "║  ⚡ Status   : ✅ Ready              ║"
          Write-Host "║  🔇 Sound   : OFF                   ║"
          Write-Host "║  💾 Storage : Large                 ║"
          Write-Host "╚═══════════════════════════════════════╝"
          
      - name: Maintain Connection
        run: |
          Write-Host "`n=== 🔵 RDP IS ACTIVE ==="
          Write-Host "IP: $env:TAILSCALE_IP"
          Write-Host "User: RDP"
          Write-Host "Pass: P@ssw0rd123"
          Write-Host "========================`n"
          Write-Host "🔄 Click 'Cancel workflow' to stop"
          
          while ($true) {
              Write-Host "[$(Get-Date -Format 'HH:mm:ss')] ✅ RDP Active"
              Start-Sleep -Seconds 300
          }
